# cargo-deny configuration.
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []

# ---------------------------------------------------------------------------
# Licenses
# ---------------------------------------------------------------------------
[licenses]
version = 2
# All licenses that appear in the dependency tree must be explicitly allowed.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]

# ---------------------------------------------------------------------------
# Banned crates
# ---------------------------------------------------------------------------
[bans]
# Warn on duplicate versions; deny on known-bad crates.
multiple-versions = "warn"
wildcards = "warn"
deny = [
  # openssl: prefer rustls everywhere; openssl adds C build complexity and
  # has a history of CVEs. Firma uses rustls exclusively.
  { crate = "openssl", reason = "use rustls; openssl not permitted" },
  { crate = "openssl-sys", reason = "use rustls; openssl not permitted" },
]

# Advisories are handled exclusively by cargo-audit (see .cargo/audit.toml).

# ---------------------------------------------------------------------------
# Sources
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
