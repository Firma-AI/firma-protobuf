name: Publish

# Publishes firma-protobuf to crates.io when a GitHub release is published.
# The release tag (e.g. v0.1.0) must match the version in Cargo.toml.
#
# Authentication uses crates.io trusted publishing (OIDC) — no long-lived
# CARGO_REGISTRY_TOKEN secret is stored. The crate must be configured with a
# trusted publisher pointing at this repository and workflow on crates.io.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # required for crates.io trusted publishing (OIDC)
    steps:
      # protoc is vendored via protoc-bin-vendored in build.rs, so no system
      # protoc install step is needed for the verification build.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish
